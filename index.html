<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>TCE Booking</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app-frame {
      width: 100vw;
      height: 100dvh;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #ffffff;
      font-size: 16px;
      letter-spacing: 0.3px;
    }

    .loading.hide {
      display: none;
    }

    @supports not (height: 100dvh) {
      .app-frame {
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div id="loading" class="loading">กำลังโหลดระบบจองรถและห้องประชุม...</div>

  <iframe
    id="appFrame"
    class="app-frame"
    title="ระบบจองรถและห้องประชุม"
    allow="fullscreen"
    allowfullscreen>
  </iframe>

  <script>
    const desktopUrl = "https://script.google.com/macros/s/AKfycbz9Dc6pEjT2ERZzmzf3skrIA7LrTDARx4Jq3dLJy6HHUv3keh-6jnXO58HZjklaCXFOdQ/exec";
    const mobileUrl = "https://script.google.com/macros/s/AKfycbz9Dc6pEjT2ERZzmzf3skrIA7LrTDARx4Jq3dLJy6HHUv3keh-6jnXO58HZjklaCXFOdQ/exec?view=mobile";

    function isMobileDevice() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isPhone = /android|iphone|ipod|blackberry|iemobile|opera mini/i.test(ua);
      const isSmallScreen = window.innerWidth <= 768;
      return isPhone || isSmallScreen;
    }

    const frame = document.getElementById("appFrame");
    const loading = document.getElementById("loading");

    frame.src = isMobileDevice() ? mobileUrl : desktopUrl;

    frame.addEventListener("load", function () {
      loading.classList.add("hide");
    });
  </script>
</body>
</html>
